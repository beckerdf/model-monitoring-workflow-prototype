name: Validate Prototype

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install prototype dependencies
        working-directory: prototype
        run: npm install

      - name: Confirm required files are present
        run: |
          test -f prototype/App.jsx
          test -f schema/rotation-queue.md
          test -f schema/review-inventory.md
          test -f docs/workflow-overview.md
          echo "All required files present."
